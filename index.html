
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .hero {
    background: #1a1a2e;
    border-radius: var(--border-radius-lg);
    padding: 2rem 1.5rem 1.5rem;
    margin-bottom: 1rem;
    text-align: center;
  }
  .hero-tag {
    display: inline-block;
    background: #f0c040;
    color: #1a1a2e;
    font-size: 12px;
    font-weight: 500;
    padding: 3px 14px;
    border-radius: 20px;
    margin-bottom: 0.75rem;
    letter-spacing: 1px;
  }
  .hero-title { font-size: 26px; font-weight: 500; color: #fff; margin-bottom: 0.4rem; }
  .hero-sub { font-size: 13px; color: #aaa; margin-bottom: 1.25rem; }
  .badges { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .badge {
    background: rgba(240,192,64,0.15);
    border: 0.5px solid #f0c040;
    color: #f0c040;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--color-text-secondary);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 1.25rem 0 0.6rem;
  }
  .calculator {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .calc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .calc-label { font-size: 13px; color: var(--color-text-secondary); width: 70px; flex-shrink: 0; }
  .calc-row select, .calc-row input[type=number] {
    flex: 1; font-size: 13px; padding: 6px 10px;
    border-radius: var(--border-radius-md);
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-secondary);
    color: var(--color-text-primary);
  }
  .time-display {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: #f0c040;
    background: #1a1a2e;
    border-radius: var(--border-radius-md);
    padding: 6px 10px;
    text-align: center;
  }
  .extra-row { display: flex; align-items: center; gap: 8px; flex: 1; }
  .extra-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 0.5px solid #f0c040;
    background: transparent;
    color: #f0c040;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .extra-btn:hover { background: rgba(240,192,64,0.15); }
  .extra-val { font-size: 14px; font-weight: 500; color: var(--color-text-primary); min-width: 60px; text-align: center; }
  .extra-hint { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
  .input-hint { font-size: 11px; color: var(--color-text-secondary); margin-top: 4px; padding-left: 80px; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 12px 0; }
  .result-box {
    margin-top: 14px;
    background: #1a1a2e;
    border-radius: var(--border-radius-md);
    padding: 1rem 1.25rem;
  }
  .result-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .result-label { font-size: 12px; color: #aaa; margin-bottom: 2px; }
  .result-amount { font-size: 22px; font-weight: 500; color: #f0c040; }
  .result-detail { font-size: 11px; color: #666; margin-top: 3px; }
  .offset-note {
    border-top: 0.5px solid rgba(240,192,64,0.2);
    padding-top: 10px;
    font-size: 12px;
    color: #f0c040;
    text-align: center;
  }
</style>

<div style="padding: 0.5rem 0 2rem;">
  <div class="hero">
    <div class="hero-tag">假日包場</div>
    <div class="hero-title">Wink 夜場方案</div>
    <div class="hero-sub">至少 4 小時包場，選好時間輕鬆試算</div>
    <div class="badges">
      <span class="badge">至少 4 小時</span>
      <span class="badge">人頭 $500／位</span>
      <span class="badge">最低 30 位起</span>
    </div>
  </div>

  <div class="section-label">試算工具</div>
  <div class="calculator">
    <div class="calc-row">
      <span class="calc-label">開始時間</span>
      <select id="startSelect"></select>
    </div>
    <div class="calc-row">
      <span class="calc-label">延長時數</span>
      <div class="extra-row">
        <button class="extra-btn" onclick="changeExtra(-1)">－</button>
        <div style="flex:1; text-align:center;">
          <div class="extra-val" id="extraVal">0 小時</div>
          <div class="extra-hint" id="extraHint">不延長</div>
        </div>
        <button class="extra-btn" onclick="changeExtra(1)">＋</button>
      </div>
    </div>
    <div class="calc-row">
      <span class="calc-label">結束時間</span>
      <div class="time-display" id="endTime">–</div>
    </div>
    <hr class="divider">
    <div class="calc-row" style="margin-bottom: 4px;">
      <span class="calc-label">預計人數</span>
      <input type="number" id="headCount" value="30" min="30" max="200" oninput="clampAndCalc()" />
    </div>
    <div class="input-hint">最低 30 位起</div>
    <div class="result-box">
      <div class="result-top">
        <div>
          <div class="result-label">預估總費用</div>
          <div id="resultAmount" class="result-amount">–</div>
          <div id="resultDetail" class="result-detail">–</div>
        </div>
        <div style="text-align:right;">
          <div class="result-label">平均每人</div>
          <div id="perPerson" style="font-size:16px;font-weight:500;color:#f0c040;margin-top:4px;">–</div>
        </div>
      </div>
      <div class="offset-note">總費用可全額抵餐飲酒水消費</div>
    </div>
  </div>

  <div style="font-size:11px;color:var(--color-text-secondary);text-align:center;padding-bottom:1rem;">
    以上費用單位為新台幣
  </div>
</div>

<script>
  const BASE_PRICE = 14000;
  const BASE_END = 1230; // 20:30

  const slots = [];
  for (let m = 720; m <= 1440; m += 30) {
    const h = Math.floor(m / 60) % 24;
    const mm = m % 60;
    const label = String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
    slots.push({ label, minutes: m });
  }

  const sel = document.getElementById('startSelect');
  slots.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = s.label;
    if (s.label === '19:00') opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => { extraHalfHours = 0; calc(); });

  let extraHalfHours = 0;

  function calcVenuePrice(startMin, extraHalves) {
    const baseEndMin = startMin + 240;
    let price = BASE_PRICE;
    if (baseEndMin > BASE_END) {
      price += ((baseEndMin - BASE_END) / 30) * 3000;
    }
    for (let i = 0; i < extraHalves; i++) {
      const thisEnd = baseEndMin + (i + 1) * 30;
      price += thisEnd <= BASE_END ? 1500 : 3000;
    }
    return price;
  }

  function changeExtra(delta) {
    const idx = parseInt(sel.value);
    const slot = slots[idx];
    const newExtra = extraHalfHours + delta;
    if (newExtra < 0) return;
    if (slot.minutes + 240 + newExtra * 30 > 1680) return;
    extraHalfHours = newExtra;
    calc();
  }

  function toTimeLabel(minutes) {
    const h = Math.floor(minutes / 60) % 24;
    const mm = minutes % 60;
    return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
  }

  function clampAndCalc() {
    const inp = document.getElementById('headCount');
    const v = parseInt(inp.value);
    if (!isNaN(v) && v < 30) inp.value = 30;
    calc();
  }

  function calc() {
    const idx = parseInt(sel.value);
    const slot = slots[idx];
    const maxExtra = Math.floor((1680 - slot.minutes - 240) / 30);
    if (extraHalfHours > maxExtra) extraHalfHours = Math.max(0, maxExtra);

    const endMin = slot.minutes + 240 + extraHalfHours * 30;
    document.getElementById('endTime').textContent = toTimeLabel(endMin);

    const venueTotal = calcVenuePrice(slot.minutes, extraHalfHours);
    const basePrice = calcVenuePrice(slot.minutes, 0);
    const extraFee = venueTotal - basePrice;

    if (extraHalfHours === 0) {
      document.getElementById('extraVal').textContent = '0 小時';
      document.getElementById('extraHint').textContent = '不延長';
    } else {
      const hrs = Math.floor(extraHalfHours / 2);
      const half = extraHalfHours % 2 === 1;
      const label = hrs > 0 && half ? `${hrs} 小時 30 分` : hrs > 0 ? `${hrs} 小時` : '30 分';
      document.getElementById('extraVal').textContent = label;
      document.getElementById('extraHint').textContent = `+$${extraFee.toLocaleString()}`;
    }

    const raw = Math.max(parseInt(document.getElementById('headCount').value) || 30, 30);
    const headFee = raw * 500;
    const total = venueTotal + headFee;
    const perPerson = Math.round(total / raw);

    document.getElementById('resultAmount').textContent = '$' + total.toLocaleString();
    document.getElementById('perPerson').textContent = '$' + perPerson.toLocaleString();

    let detail = `場地 $${venueTotal.toLocaleString()}`;
    if (extraHalfHours > 0) detail += `（含延長 $${extraFee.toLocaleString()}）`;
    detail += ` ＋ 人頭 $${headFee.toLocaleString()}（${raw} 位）`;
    document.getElementById('resultDetail').textContent = detail;
  }

  calc();
</script>
