<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wink 夜場方案試算</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ── Hero ── */
    .hero {
      background: #1c1c2e;
      border-radius: 20px;
      padding: 2rem 1.5rem 1.75rem;
      text-align: center;
      color: #fff;
    }
    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #f0c040;
      color: #1c1c2e;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 999px;
      margin-bottom: 1rem;
      letter-spacing: 0.5px;
    }
    .hero-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 0.4rem;
      letter-spacing: -0.5px;
    }
    .hero-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 1.5rem;
    }
    .badges {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(240,192,64,0.12);
      border: 1px solid rgba(240,192,64,0.4);
      color: #f0c040;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 999px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.04);
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }
    .card-title svg { color: #a1a1a6; }

    /* ── Form rows ── */
    .field {
      display: grid;
      grid-template-columns: 76px 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      font-size: 13px;
      color: #6e6e73;
      font-weight: 500;
    }
    .field-label-sub {
      font-size: 11px;
      color: #aeaeb2;
      margin-top: 2px;
    }

    select, input[type=number] {
      width: 100%;
      font-size: 15px;
      font-weight: 500;
      color: #1d1d1f;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1.5px solid #e5e5ea;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }
    select:focus, input[type=number]:focus { border-color: #007aff; background: #fff; }

    .select-wrap { position: relative; }
    .select-wrap svg {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #aeaeb2;
    }

    /* stepper */
    .stepper {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .step-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid #e5e5ea;
      background: #fff;
      color: #1d1d1f;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .step-btn:hover:not(:disabled) { background: #f5f5f7; border-color: #c7c7cc; }
    .step-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .step-val {
      flex: 1;
      text-align: center;
    }
    .step-val-main { font-size: 15px; font-weight: 600; color: #1d1d1f; }
    .step-val-sub { font-size: 12px; color: #aeaeb2; margin-top: 2px; }

    /* time display */
    .time-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f5f5f7;
      border: 1.5px solid #e5e5ea;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 15px;
      font-weight: 600;
      color: #1d1d1f;
    }
    .time-chip svg { color: #aeaeb2; }

    .divider {
      border: none;
      border-top: 1px solid #f2f2f7;
      margin: 1rem 0;
    }

    /* ── Result ── */
    .result-card {
      background: #1c1c2e;
      border-radius: 16px;
      padding: 1.5rem;
      color: #fff;
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .result-label {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .result-amount {
      font-size: 30px;
      font-weight: 700;
      color: #f0c040;
      letter-spacing: -0.5px;
    }
    .result-detail {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 5px;
      line-height: 1.6;
    }
    .result-per {
      text-align: right;
    }
    .result-per-amount {
      font-size: 20px;
      font-weight: 700;
      color: #f0c040;
    }
    .result-note {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(240,192,64,0.1);
      border: 1px solid rgba(240,192,64,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #f0c040;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #aeaeb2;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Hero -->
    <div class="hero">
      <div class="hero-tag">
        <i data-lucide="calendar" style="width:12px;height:12px;"></i>
        假日包場
      </div>
      <div class="hero-title">Wink 夜場方案</div>
      <div class="hero-sub">至少 4 小時包場，選好時間輕鬆試算</div>
      <div class="badges">
        <span class="badge"><i data-lucide="clock" style="width:12px;height:12px;"></i>至少 4 小時</span>
        <span class="badge"><i data-lucide="user" style="width:12px;height:12px;"></i>人頭 $500／位</span>
        <span class="badge"><i data-lucide="users" style="width:12px;height:12px;"></i>最低 30 位起</span>
      </div>
    </div>

    <!-- Calculator -->
    <div class="card">
      <div class="card-title">
        <i data-lucide="calculator" style="width:15px;height:15px;"></i>
        試算工具
      </div>

      <!-- 開始時間 -->
      <div class="field">
        <div>
          <div class="field-label">開始時間</div>
        </div>
        <div class="select-wrap">
          <select id="startSelect"></select>
          <i data-lucide="chevron-down" style="width:16px;height:16px;"></i>
        </div>
      </div>

      <!-- 延長時數 -->
      <div class="field">
        <div>
          <div class="field-label">延長時數</div>
        </div>
        <div class="stepper">
          <button class="step-btn" id="btnMinus" onclick="changeExtra(-1)">
            <i data-lucide="minus" style="width:16px;height:16px;"></i>
          </button>
          <div class="step-val">
            <div class="step-val-main" id="extraVal">0 小時</div>
            <div class="step-val-sub" id="extraHint">不延長</div>
          </div>
          <button class="step-btn" id="btnPlus" onclick="changeExtra(1)">
            <i data-lucide="plus" style="width:16px;height:16px;"></i>
          </button>
        </div>
      </div>

      <!-- 結束時間 -->
      <div class="field">
        <div>
          <div class="field-label">結束時間</div>
        </div>
        <div class="time-chip">
          <i data-lucide="flag" style="width:14px;height:14px;"></i>
          <span id="endTime">–</span>
        </div>
      </div>

      <hr class="divider" />

      <!-- 預計人數 -->
      <div class="field">
        <div>
          <div class="field-label">預計人數</div>
          <div class="field-label-sub">最低 30 位</div>
        </div>
        <input type="number" id="headCount" value="30" min="30" max="200" oninput="clampAndCalc()" />
      </div>
    </div>

    <!-- Result -->
    <div class="result-card">
      <div class="result-grid">
        <div>
          <div class="result-label">預估總費用</div>
          <div id="resultAmount" class="result-amount">–</div>
          <div id="resultDetail" class="result-detail">–</div>
        </div>
        <div class="result-per">
          <div class="result-label">平均每人</div>
          <div id="perPerson" class="result-per-amount">–</div>
        </div>
      </div>
      <div class="result-note">
        <i data-lucide="check-circle" style="width:14px;height:14px;flex-shrink:0;"></i>
        總費用可全額抵餐飲酒水消費
      </div>
    </div>

    <div class="footer-note">以上費用單位為新台幣</div>

  </div>

  <script>
    lucide.createIcons();

    const BASE_PRICE = 14000;
    const BASE_END = 1230;

    const slots = [];
    for (let m = 720; m <= 1440; m += 30) {
      const h = Math.floor(m / 60) % 24;
      const mm = m % 60;
      slots.push({ label: String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0'), minutes: m });
    }

    const sel = document.getElementById('startSelect');
    slots.forEach((s, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = s.label;
      if (s.label === '19:00') opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => { extraHalfHours = 0; calc(); });

    let extraHalfHours = 0;

    function calcVenuePrice(startMin, extraHalves) {
      const baseEndMin = startMin + 240;
      let price = BASE_PRICE;
      if (baseEndMin > BASE_END) price += ((baseEndMin - BASE_END) / 30) * 3000;
      for (let i = 0; i < extraHalves; i++) {
        const thisEnd = baseEndMin + (i + 1) * 30;
        price += thisEnd <= BASE_END ? 1500 : 3000;
      }
      return price;
    }

    function changeExtra(delta) {
      const idx = parseInt(sel.value);
      const slot = slots[idx];
      const newExtra = extraHalfHours + delta;
      if (newExtra < 0) return;
      if (slot.minutes + 240 + newExtra * 30 > 1680) return;
      extraHalfHours = newExtra;
      calc();
    }

    function toTimeLabel(minutes) {
      const h = Math.floor(minutes / 60) % 24;
      const mm = minutes % 60;
      return String(h).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
    }

    function clampAndCalc() {
      const inp = document.getElementById('headCount');
      if (!isNaN(parseInt(inp.value)) && parseInt(inp.value) < 30) inp.value = 30;
      calc();
    }

    function calc() {
      const idx = parseInt(sel.value);
      const slot = slots[idx];
      const maxExtra = Math.floor((1680 - slot.minutes - 240) / 30);
      if (extraHalfHours > maxExtra) extraHalfHours = Math.max(0, maxExtra);

      const endMin = slot.minutes + 240 + extraHalfHours * 30;
      document.getElementById('endTime').textContent = toTimeLabel(endMin);

      const venueTotal = calcVenuePrice(slot.minutes, extraHalfHours);
      const basePrice = calcVenuePrice(slot.minutes, 0);
      const extraFee = venueTotal - basePrice;

      if (extraHalfHours === 0) {
        document.getElementById('extraVal').textContent = '0 小時';
        document.getElementById('extraHint').textContent = '不延長';
      } else {
        const hrs = Math.floor(extraHalfHours / 2);
        const half = extraHalfHours % 2 === 1;
        const label = hrs > 0 && half ? `${hrs} 小時 30 分` : hrs > 0 ? `${hrs} 小時` : '30 分';
        document.getElementById('extraVal').textContent = label;
        document.getElementById('extraHint').textContent = `+$${extraFee.toLocaleString()}`;
      }

      const raw = Math.max(parseInt(document.getElementById('headCount').value) || 30, 30);
      const headFee = raw * 500;
      const total = venueTotal + headFee;
      const perPerson = Math.round(total / raw);

      document.getElementById('resultAmount').textContent = '$' + total.toLocaleString();
      document.getElementById('perPerson').textContent = '$' + perPerson.toLocaleString();

      let detail = `場地 $${venueTotal.toLocaleString()}`;
      if (extraHalfHours > 0) detail += `（含延長 $${extraFee.toLocaleString()}）`;
      detail += `\n人頭 $${headFee.toLocaleString()}（${raw} 位）`;
      document.getElementById('resultDetail').textContent = detail;

      document.getElementById('btnMinus').disabled = extraHalfHours === 0;
      document.getElementById('btnPlus').disabled = extraHalfHours >= maxExtra;

      lucide.createIcons();
    }

    calc();
  </script>
</body>
</html>
